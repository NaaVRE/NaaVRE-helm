name: Check Jupyter Lab image manifests

on:
  push:
    branches:
      - '**'
  schedule:
    - cron: '0 4 5,25 * *'

jobs:
  validate-images:
    name: Validate Jupyter Lab image manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Jupyter Lab image manifests
        run: |
          set -euo pipefail

          failed=0

          for file in values/virtual-labs/values-*.yaml; do
            echo "--- Checking: $file"

            # Iterate over all vlabs defined under jupyterhub.vlabs in this file.
            # A single values file may define multiple vlabs.
            mapfile -t vlabs < <(yq '.jupyterhub.vlabs | keys | .[]' "$file")

            for vlab in "${vlabs[@]}"; do
              image_name=$(yq ".jupyterhub.vlabs.\"${vlab}\".image.name" "$file")
              image_tag=$(yq  ".jupyterhub.vlabs.\"${vlab}\".image.tag"  "$file")

              # Guard against missing keys
              if [[ "$image_name" == "null" || -z "$image_name" ||
                    "$image_tag"  == "null" || -z "$image_tag"  ]]; then
                continue
              fi

              image_ref="${image_name}:${image_tag}"
              echo "  Checking vlab '$vlab' → $image_ref"

              if ! docker manifest inspect -v "$image_ref" > /dev/null 2>&1; then
                echo "::error file=${file}::[$vlab] \
          Cannot retrieve manifest for '${image_ref}'. \
          Make sure the image name and tag are correct and the image is accessible."
                failed=1
              else
                echo "  ✓ $image_ref"
              fi
            done
          done

          if [[ $failed -ne 0 ]]; then
            echo ""
            echo "❌ One or more image manifests could not be retrieved. See annotated errors above."
            exit 1
          fi

          echo ""
          echo "✅ All Jupyter Lab image manifests validated successfully."
