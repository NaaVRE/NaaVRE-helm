jupyterhub:
  vlabs:
    aneris:
      enabled: false
      slug: aneris
      title:  Essential Climate Variables Virtual Lab
      communities: [naavre]
      labels: [aneris]
      description: |
        A virtual lab to access ANERIS.
      dirname: ANERIS
      image:
        name: ghcr.io/naavre/flavors/naavre-fl-aneris-jupyter
        tag: v0.1.16
      configuration:
        base_image_tags_url: https://github.com/NaaVRE/flavors/releases/download/v0.1.16/base_image_tags.json
        module_mapping_url: https://raw.githubusercontent.com/QCDIS/NaaVRE-conf/main/module_mapping.json
        cell_github_url: https://github.com/NaaVRE/cells-vl-aneris
        registry_url: ghcr.io/naavre/cells-vl-aneris
        log_queries: true
        git_public:
          repo: https://github.com/QCDIS/aneris.git
          branch: main
        default_file_path: Virtual Labs/ANERIS/Git public/README.md
