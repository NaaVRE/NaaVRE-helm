jupyterhub:
  vlabs:
    geospatial-toolbox:
      enabled: false
      slug: geospatial-toolbox
      title: GeoSpatial Toolbox
      communities: [naavre, lter-life]
      labels: [lter-life]
      description: Virtual lab supporting the search, downloading, and manipulation of geospatial data, such as satellite imagery, and extracting such data to inform ecological workflows.
      # TODO: add environment to repo
      binder_ref: gh/NaaVRE/vl-geospatial-toolbox/main
      configuration:
        base_image_tags_url: https://github.com/NaaVRE/flavors/releases/download/v0.3.5/base_image_tags.json
        module_mapping_url: https://raw.githubusercontent.com/QCDIS/NaaVRE-conf/main/module_mapping.json
        cell_github_url: https://github.com/NaaVRE/cells-vl-geospatial-toolbox
        registry_url: ghcr.io/naavre/cells-vl-geospatial-toolbox
        splitter_max_branches: 32
        default_file_path: README.md
