nameOverride: ""
fullnameOverride: ""

argo-workflows:
  enabled: true

binderhub: {}
# Schema validation fails if binderhub.enable is present,
# so we use a separate key for this chart
binderhubEnabled: true

k8s-secret-creator:
  enabled: true

keycloak-db:
  enabled: true

seaweedfs:
  enabled: true

naavre-catalogue-service:
  enabled: true

naavre-containerizer-service:
  enabled: true

naavre-workflow-service:
  enabled: true

naavre-paas-frontend:
  enabled: true

global:
  ingress:
    domain: example.com
    commonAnnotations: {}
    redirectDomainToPaasFrontend: false
    basePaths:
      keycloak: /auth

  secrets:
    keycloak:
      client_id:
      client_secret:
      adminPassword:
      users: []
      # users:
      #   - username: example-1
      #     password: ...
      #     firstName: ...
      #     lastName: ...
      #     email: ...
      postgresql:
        database:
        username:
        password:
    seaweedfs:
      access_key:
      secret_key:

  keycloak:
    image:

  communities: {}
  # myCommunity:
  #   title: My community

  vlabLabels: {}
  # myLabel:
  #   title: My label
  #   color: "#3c8f49"


  vlabs:
    openlab:
      enabled: true
      slug: openlab
      title: "NaaVRE Open Lab"
      communities: []
      # communities: [myCommunity]
      labels: []
      # labels: [myLabel]
      description: "Open experimentation with virtual labs"
      icon: ""
      binder_ref: gh/NaaVRE/vl-openlab/HEAD
      configuration:
        base_image_tags_url: https://github.com/NaaVRE/flavors/releases/download/v0.0.1/base_image_tags.json
        module_mapping_url: https://raw.githubusercontent.com/QCDIS/NaaVRE-conf/main/module_mapping.json
        cell_github_url:
        cell_github_token:
        registry_url:
        # registry_token:
        git_public: {}
