naavre-workflow-service:
  enabled: {{ .Values.naavreWorkflowService.enabled }}
  fullnameOverride: "{{ include "values.fullname" . }}-naavre-workflow-service"

  ingress:
    enabled: true
    className: "nginx"
    {{- with .Values.global.ingress.commonAnnotations }}
    annotations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    hosts:
      - host: "{{ .Values.global.ingress.domain }}"
        paths:
          - path: "/{{ trimAll "/" (.Values.naavreWorkflowService.ingress.basePath) }}/"
            pathType: Prefix
    {{- if .Values.global.ingress.tls.enabled }}
    tls:
      - hosts:
          - "{{ .Values.global.ingress.domain }}"
        secretName: "{{ .Values.global.ingress.domain }}-tls"
    {{- end }}

  conf:
    rootPath: "/{{ trimAll "/" (.Values.naavreWorkflowService.ingress.basePath) }}"
    virtual_labs_configuration:
      {{- define "workflow_service_vl_configuration" -}}
      vl_configurations:
        {{- range $index, $vlab := .Values.jupyterhub.vlabs }}
        {{- if $vlab.enabled }}
        - name: "{{ $vlab.slug }}"
          wf_engine_config:
            name: "argo"
            {{- $externalArgoWorkflows := false }}
            {{- if ($vlab.configuration.workflowEngineOverride | default dict).argoWorkflows }}
            {{- $externalArgoWorkflows = $vlab.configuration.workflowEngineOverride.argoWorkflows }}
            {{- else if $.Values.global.externalServices.argoWorkflows.useExternal }}
            {{- $externalArgoWorkflows = $.Values.global.externalServices.argoWorkflows }}
            {{- end }}
            {{- if $externalArgoWorkflows }}
            namespace: "{{ $externalArgoWorkflows.namespace }}"
            api_endpoint: "{{ $externalArgoWorkflows.url }}/"
            access_token: "{{ $externalArgoWorkflows.token }}"
            service_account: "{{ $externalArgoWorkflows.executor_service_account }}"
            {{- else }}
            namespace: "{{ $.Values.global.namespace }}"
            api_endpoint: "https://{{ $.Values.global.ingress.domain }}/{{ trimAll "/" $.Values.argoWorkflows.ingress.basePath }}/"
            access_token: "++argo-vreapi.service-account-token++"
            service_account: "argo-executor"
            {{- end }}
            workdir_storage_size: "1Gi"
            {{- if $.Values.global.common.userPods.extraVolumeMounts }}
            extraVolumeMounts:
              {{- $.Values.global.common.userPods.extraVolumeMounts | toYaml | nindent 14 }}
            {{- end }}
            {{- $externalK8sSecretCreator := false }}
            {{- if ($vlab.configuration.workflowEngineOverride | default dict).k8sSecretCreator }}
            {{- $externalK8sSecretCreator = $vlab.configuration.workflowEngineOverride.k8sSecretCreator }}
            {{- else if $.Values.global.externalServices.k8sSecretCreator.useExternal }}
            {{- $externalK8sSecretCreator = $.Values.global.externalServices.k8sSecretCreator }}
            {{- end }}
            {{- if $externalK8sSecretCreator }}
            secrets_creator_api_endpoint: "{{ $externalK8sSecretCreator.url }}"
            secrets_creator_api_token: "{{ $externalK8sSecretCreator.token }}"
            {{- else }}
            secrets_creator_api_endpoint: "https://{{ $.Values.global.ingress.domain }}/{{ trimAll "/" $.Values.k8sSecretCreator.ingress.basePath }}/1.0.0/"
            secrets_creator_api_token: "{{ $.Values.global.secrets.k8sSecretCreator.apiToken }}"
            {{- end }}
        {{- end }}
        {{- end }}
      {{- end }}
      rawJson: |
        {{- include "workflow_service_vl_configuration" . | fromYaml | toPrettyJson | nindent 8 }}

  env:
    {{- if .Values.global.insecureSkipVerifySSL }}
    VERIFY_SSL: "false"
    {{- end }}
    {{- if .Values.global.externalServices.keycloak.useExternal }}
    OIDC_CONFIGURATION_URL: "{{ trimSuffix "/" .Values.global.externalServices.keycloak.url }}/realms/{{ .Values.global.externalServices.keycloak.realm }}/.well-known/openid-configuration"
    {{- else }}
    OIDC_CONFIGURATION_URL: "https://{{ .Values.global.ingress.domain }}/{{ trimAll "/" .Values.keycloak.ingress.basePath }}/realms/vre/.well-known/openid-configuration"
    {{- end }}
    CONFIG_FILE_URL: "/configuration.json"

  affinity:
    {{- toYaml .Values.global.common.corePods.affinity | nindent 4 }}
