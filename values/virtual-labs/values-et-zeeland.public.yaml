jupyterhub:
  vlabs:
    et-zeeland:
      enabled: false
      slug: et-zeeland
      title:  Evapotransportation and heat fluxes over different locations in Zeeland
      communities: [naavre]
      labels: []
      description: |
        Combining observations of soil, plant and atmospheric properties with a number of coupled soil-land-atmosphere models to model evapotransportation and heat fluxes over different locations in Zeeland.
      dirname: ET Zeeland
      image:
        name: ghcr.io/naavre/flavors/naavre-fl-et-zeeland-jupyter
        tag: v0.3.5
      # TODO: add environment to repo
      binder_ref: gh/NaaVRE/vl-ET-Zeeland/main
      configuration:
        base_image_tags_url: https://github.com/NaaVRE/flavors/releases/download/v0.3.5/base_image_tags.json
        module_mapping_url: https://raw.githubusercontent.com/QCDIS/NaaVRE-conf/main/module_mapping.json
        cell_github_url: https://github.com/NaaVRE/cells-vl-et-zeeland
        registry_url: ghcr.io/naavre/cells-vl-et-zeeland
        log_queries: true
        splitter_max_branches: 32
        git_public:
          repo: https://github.com/naavre/vl-et-zeeland.git
          branch: main
        default_file_path: README.md
