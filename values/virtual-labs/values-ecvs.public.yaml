jupyterhub:
  vlabs:
    ecvs:
      enabled: false
      slug: ecvs
      title:  Essential Climate Variables Virtual Lab
      communities: [naavre]
      labels: [ecvs]
      description: |
        A virtual lab to access ECVs. The workflows in the VLab were developed by ENVRI-Hub-NEXT project.
      # TODO: add environment to repo
      binder_ref: gh/QCDIS/ecvs/main
      configuration:
        base_image_tags_url: https://github.com/NaaVRE/flavors/releases/download/v0.3.5/base_image_tags.json
        module_mapping_url: https://raw.githubusercontent.com/QCDIS/NaaVRE-conf/main/module_mapping.json
        cell_github_url: https://github.com/NaaVRE/cells-vl-ecvs
        registry_url: ghcr.io/naavre/cells-vl-ecvs
        splitter_max_branches: 32
        default_file_path: README.md
