    controllerPublishSecretRef:
      name: csi-s3-secret
      namespace: csi-s3
    nodePublishSecretRef:
      name: csi-s3-secret
      namespace: csi-s3
    nodeStageSecretRef:
      name: csi-s3-secret
      namespace: csi-s3
    volumeAttributes:
      capacity: 10Gi
      mounter: geesefs
      options: --memory-limit 1000 --dir-mode 0777 --file-mode 0666 --uid 1000 --gid 100
    volumeHandle: naa-vre-user-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: naavre
  name: csi-s3-naa-vre-user-data-bucket
spec:
  # Empty storage class disables dynamic provisioning
  storageClassName: ""
